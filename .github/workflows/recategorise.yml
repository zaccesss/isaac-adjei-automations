# One-off backfill that re-categorises existing scraped applications with the AI. Manual trigger only.
# Defaults to a dry run (preview, no DB writes) - untick dry_run to actually apply the changes.

name: Re-categorise jobs

on:
  schedule:
    # Nightly mop-up on fresh Groq quota at 06:00 Europe/London: re-categorises any "Software
    # Engineering" catch-all rows. Two UTC crons (05:00 and 06:00) cover BST and GMT; a gate step runs
    # it only at 06:xx UK. Idempotent, so it changes nothing once everything is already sorted. A
    # scheduled run applies for real (dry-run only defaults on for the manual trigger).
    - cron: "11,41 5-8 * * *" # every 30 min, 05:00-08:30 UTC (covers 06:00-09:00 UK in BST and GMT); idempotent
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (preview only, no DB writes). Untick to apply."
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  recategorise:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      DISCORD_WEBHOOK_ERRORS: ${{ secrets.DISCORD_WEBHOOK_ERRORS }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
      RECATEGORISE_DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
    steps:
      - name: Gate to the 06:00-09:00 UK window
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "manual run - proceeding"; echo "go=1" >> "$GITHUB_OUTPUT"; exit 0
          fi
          H=$((10#$(TZ=Europe/London date +%H)))
          if [ "$H" -ge 6 ] && [ "$H" -le 9 ]; then
            echo "go=1" >> "$GITHUB_OUTPUT"
          else
            echo "outside 06-09 UK (is ${H}) - skipping"; echo "go=0" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.go == '1'
        uses: actions/checkout@v4

      - name: Healthcheck start
        if: steps.gate.outputs.go == '1'
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: recategorise
          status: start

      - if: steps.gate.outputs.go == '1'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - if: steps.gate.outputs.go == '1'
        run: pip install requests

      - if: steps.gate.outputs.go == '1'
        run: python scripts/recategorise.py

      - name: Healthcheck success
        if: steps.gate.outputs.go == '1'
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: recategorise

      - name: Healthcheck fail
        if: failure()
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: recategorise
          status: fail
