# One-off backfill that re-categorises existing scraped applications with the AI. Manual trigger only.
# Defaults to a dry run (preview, no DB writes) - untick dry_run to actually apply the changes.

name: Re-categorise jobs

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (preview only, no DB writes). Untick to apply."
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  recategorise:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      RECATEGORISE_DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - run: python scripts/recategorise.py
