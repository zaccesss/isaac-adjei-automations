# One-off backfill that re-categorises existing scraped applications with the AI. Manual trigger only.
# Defaults to a dry run (preview, no DB writes) - untick dry_run to actually apply the changes.

name: Re-categorise jobs

on:
  schedule:
    # Nightly mop-up on fresh Groq quota at 06:00 Europe/London: re-categorises any "Software
    # Engineering" catch-all rows. Two UTC crons (05:00 and 06:00) cover BST and GMT; a gate step runs
    # it only at 06:xx UK. Idempotent, so it changes nothing once everything is already sorted. A
    # scheduled run applies for real (dry-run only defaults on for the manual trigger).
    - cron: "0 5 * * *" # BST -> 06:00 UK
    - cron: "0 6 * * *" # GMT -> 06:00 UK
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (preview only, no DB writes). Untick to apply."
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  recategorise:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
      RECATEGORISE_DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
    steps:
      - name: Gate to 06:00 UK
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "manual run - proceeding"; echo "go=1" >> "$GITHUB_OUTPUT"; exit 0
          fi
          H=$(TZ=Europe/London date +%H)
          if [ "$H" = "06" ]; then
            echo "go=1" >> "$GITHUB_OUTPUT"
          else
            echo "not 06:xx UK (is ${H}:xx) - skipping"; echo "go=0" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.go == '1'
        uses: actions/checkout@v4

      - if: steps.gate.outputs.go == '1'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - if: steps.gate.outputs.go == '1'
        run: pip install requests

      - if: steps.gate.outputs.go == '1'
        run: python scripts/recategorise.py
