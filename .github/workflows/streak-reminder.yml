# Posts a Discord reminder of streaks not yet logged, twice a day: a morning check at 08:00
# Europe/London and an evening pass at 20:00 that only posts while something is still unlogged.
# GitHub drops many scheduled runs, so each slot fires every 30 min across its window and the gate
# step lets only the right UK hours through; the script claims (job-slot, UK-day) so neither slot
# repeats.

name: Daily Streak Reminder

on:
  schedule:
    - cron: "13,43 7-10 * * *" # morning: 07:13-10:43 UTC covers the 08:00-10:00 UK window in BST and GMT
    - cron: "13,43 19-21 * * *" # evening: 19:13-21:43 UTC covers the 20:00-22:00 UK window in BST and GMT
  workflow_dispatch:
    inputs:
      force:
        description: "Force a re-send: bypass the once-per-day claim"
        type: boolean
        default: false
      slot:
        description: "Slot: am is the morning check, pm the evening still-unlogged pass (blank = pick by London hour)"
        type: choice
        options: ["", "am", "pm"]
        default: ""

permissions:
  contents: read

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Gate to the 08:00-10:00 or 20:00-22:00 UK window
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "manual run - proceeding"; echo "go=1" >> "$GITHUB_OUTPUT"; exit 0
          fi
          H=$((10#$(TZ=Europe/London date +%H)))
          if { [ "$H" -ge 8 ] && [ "$H" -le 10 ]; } || { [ "$H" -ge 20 ] && [ "$H" -le 22 ]; }; then
            echo "go=1" >> "$GITHUB_OUTPUT"
          else
            echo "outside 08-10 and 20-22 UK (is ${H}) - skipping"; echo "go=0" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.go == '1'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - if: steps.gate.outputs.go == '1'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Healthcheck start
        if: steps.gate.outputs.go == '1'
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: streak-reminder
          status: start

      - name: Send morning streak reminder to Discord
        if: steps.gate.outputs.go == '1'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          DISCORD_WEBHOOK_ERRORS: ${{ secrets.DISCORD_WEBHOOK_ERRORS }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISCORD_WEBHOOK_STREAKS: ${{ secrets.DISCORD_WEBHOOK_STREAKS }}
          FORCE: ${{ inputs.force && '1' || '' }}
          SLOT: ${{ inputs.slot }}
        run: node scripts/send-streak-reminder.mjs

      - name: Healthcheck success
        if: steps.gate.outputs.go == '1'
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: streak-reminder

      - name: Healthcheck fail
        if: failure()
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: streak-reminder
          status: fail
