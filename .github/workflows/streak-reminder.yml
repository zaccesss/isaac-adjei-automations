# Posts a morning Discord reminder of streaks not yet logged, at 08:00 Europe/London. Two UTC crons
# (07:10 and 08:10) cover BST and GMT; a gate step runs it only at 08:xx UK. The :10 minute leaves room
# for GitHub's scheduling delay to still land inside the target hour.

name: Daily Streak Reminder

on:
  schedule:
    # Fire every 30 min across 07:00-10:00 UTC (covers the 08:00-10:00 UK window in BST and GMT). GitHub
    # drops many scheduled runs, so several tries guarantee one lands; the script claims once per day.
    - cron: "13,43 7-10 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Gate to the 08:00-10:00 UK window
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "manual run - proceeding"; echo "go=1" >> "$GITHUB_OUTPUT"; exit 0
          fi
          H=$((10#$(TZ=Europe/London date +%H)))
          if [ "$H" -ge 8 ] && [ "$H" -le 10 ]; then
            echo "go=1" >> "$GITHUB_OUTPUT"
          else
            echo "outside 08-10 UK (is ${H}) - skipping"; echo "go=0" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.go == '1'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - if: steps.gate.outputs.go == '1'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Healthcheck start
        if: steps.gate.outputs.go == '1'
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: streak-reminder
          status: start

      - name: Send morning streak reminder to Discord
        if: steps.gate.outputs.go == '1'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          DISCORD_WEBHOOK_ERRORS: ${{ secrets.DISCORD_WEBHOOK_ERRORS }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISCORD_WEBHOOK_STREAKS: ${{ secrets.DISCORD_WEBHOOK_STREAKS }}
          FORCE: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: node scripts/send-streak-reminder.mjs

      - name: Healthcheck success
        if: steps.gate.outputs.go == '1'
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: streak-reminder

      - name: Healthcheck fail
        if: failure()
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: streak-reminder
          status: fail
