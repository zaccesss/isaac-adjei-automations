# I enable auto-merge (squash) on any PR that is either opened by Dependabot or carries
# the "automerge" label. Draft PRs are skipped. This keeps dependency updates flowing
# without manual intervention while still requiring CI to pass before the merge lands.
#
# Branch deletion and keeping other automerge PRs up to date with main are handled by
# the scheduled "Repo maintenance" workflow instead of an event trigger here - GitHub
# does not fire other workflows' `push`/`pull_request` events for actions performed
# with this workflow's own GITHUB_TOKEN, so a `pull_request: closed` trigger on this
# merge would never actually run. See update-pr-branches.yml for details.

name: Auto-merge Dependabot

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    runs-on: ubuntu-latest

    steps:
      - name: Enable auto-merge for eligible PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_IS_DRAFT: ${{ github.event.pull_request.draft }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          # Never auto-merge drafts - they are explicitly not ready
          if [ "$PR_IS_DRAFT" = "true" ]; then
            echo "Draft PR - skipping auto-merge setup"
            exit 0
          fi

          # Enable for Dependabot PRs or any PR labelled "automerge"
          if [ "$PR_AUTHOR" = "dependabot[bot]" ] || echo "$PR_LABELS" | grep -Eq '(^|,)automerge(,|$)'; then
            gh pr merge --auto --squash --delete-branch "$PR_URL"
          else
            echo "Auto-merge not enabled - add the automerge label for non-Dependabot PRs"
          fi
