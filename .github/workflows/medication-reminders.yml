# Sends due medication reminders every 30 minutes. The script only acts on times that have just come
# due (in Europe/London) and de-duplicates against the dose log, so the frequent schedule is safe.

name: Medication reminders

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      test_to:
        description: "Send one test SMS to this E.164 number and exit"
        required: false
        default: ""
      test_email:
        description: "Send one test email to this address and exit"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Healthcheck start
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: medication-reminders
          status: start
      - run: node scripts/medication-reminders.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISCORD_WEBHOOK_REMINDERS: ${{ secrets.DISCORD_WEBHOOK_REMINDERS }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REMINDER_FROM_EMAIL: ${{ secrets.REMINDER_FROM_EMAIL }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          TEST_TO: ${{ github.event.inputs.test_to }}
          TEST_EMAIL: ${{ github.event.inputs.test_email }}
      - name: Healthcheck success
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: medication-reminders
      - name: Healthcheck fail
        if: failure()
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: medication-reminders
          status: fail
