# Posts a daily analytics summary to each dashboard analytics channel (Applications, Posts, Fitness, Music)
# for the day that just ended, shortly after the coding recap. GitHub Actions cron drops many runs, so this
# fires every 30 min across the small hours; the script gates to >= 01:00 UK and claims (job, UK-day), so it
# posts exactly once per day whenever a run lands. Each channel is optional - a page is skipped if its
# webhook secret is unset.

name: Daily Analytics

on:
  schedule:
    - cron: "23,53 2 * * *" # backup pair at 02:23/02:53 UTC: inside the 01:00-04:00 UK window in GMT (02:23 UK) and BST (03:23 UK)
  workflow_dispatch:
    inputs:
      force:
        description: "Force a re-send: bypass the hour gate and the once-per-day claim"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  analytics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
      - name: Healthcheck start
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: daily-analytics
          status: start
      # Secrets are scoped to this step so the setup actions never see them.
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          DISCORD_WEBHOOK_ERRORS: ${{ secrets.DISCORD_WEBHOOK_ERRORS }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISCORD_WEBHOOK_POSTS: ${{ secrets.DISCORD_WEBHOOK_POSTS }}
          DISCORD_WEBHOOK_FITNESS: ${{ secrets.DISCORD_WEBHOOK_FITNESS }}
          DISCORD_WEBHOOK_APPLICATIONS: ${{ secrets.DISCORD_WEBHOOK_APPLICATIONS }}
          DISCORD_WEBHOOK_MUSIC: ${{ secrets.DISCORD_WEBHOOK_MUSIC }}
          FORCE: ${{ inputs.force && '1' || '' }}
        run: node scripts/daily-analytics.mjs
      - name: Healthcheck success
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: daily-analytics
      - name: Healthcheck fail
        if: failure()
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: daily-analytics
          status: fail
