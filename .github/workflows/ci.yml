# Lightweight CI: syntax-checks the Python and Node scripts on every pull request and push so a
# broken change cannot land. These are standalone scripts, so there is no build step.

name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Compile-check Python scripts
        run: python -m compileall -q scripts

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Syntax-check Node scripts
        run: |
          shopt -s nullglob
          for f in scripts/*.mjs; do
            echo "node --check $f"
            node --check "$f"
          done
