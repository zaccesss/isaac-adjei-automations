# Coding recap for the day that just ended, posted just after midnight UK while yesterday is fresh.
# GitHub Actions cron is unreliable (it delays and drops runs, especially at the top of the hour), so
# instead of one fragile 00:30 slot this fires every 30 minutes across a small night window and the gate
# acts only from 00:30 to 03:00 UK; the script claims (job, UK-day) so it posts exactly once whenever a
# run finally lands. The WakaTime sync runs first so yesterday is complete before the summary reads it.

name: Daily Coding Summary

on:
  schedule:
    - cron: "7,37 23,0-2 * * *" # every 30 min, 23:07-02:37 UTC (covers the 00:30-03:00 UK window in BST and GMT)
  workflow_dispatch:
    inputs:
      force:
        description: "Force a re-send: bypass the hour gate and the once-per-day claim"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  recap:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Gate to the 00:30-03:00 UK window
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "manual run - proceeding"; echo "go=1" >> "$GITHUB_OUTPUT"; exit 0
          fi
          H=$((10#$(TZ=Europe/London date +%H)))
          M=$((10#$(TZ=Europe/London date +%M)))
          # The window opens at 00:30, not 00:00, so the just-ended day's final WakaTime heartbeats
          # have settled before the sync reads it.
          if { [ "$H" -eq 0 ] && [ "$M" -ge 30 ]; } || [ "$H" -eq 1 ] || [ "$H" -eq 2 ]; then
            echo "go=1" >> "$GITHUB_OUTPUT"
          else
            echo "outside 00:30-03:00 UK (is ${H}:${M}) - skipping"; echo "go=0" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.go == '1'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Healthcheck start
        if: steps.gate.outputs.go == '1'
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: daily-coding-summary
          status: start

      - if: steps.gate.outputs.go == '1'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - if: steps.gate.outputs.go == '1'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - if: steps.gate.outputs.go == '1'
        run: pip install -r scripts/requirements.txt

      - name: Sync WakaTime data (the just-ended day is now complete)
        if: steps.gate.outputs.go == '1'
        # Secrets are scoped to the two script steps so the setup actions never see them.
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISCORD_WEBHOOK_ERRORS: ${{ secrets.DISCORD_WEBHOOK_ERRORS }}
        run: python scripts/wakatime-sync.py

      - name: Post the daily coding summary to Discord
        if: steps.gate.outputs.go == '1'
        env:
          DISCORD_WEBHOOK_CODING: ${{ secrets.DISCORD_WEBHOOK_CODING }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISCORD_WEBHOOK_ERRORS: ${{ secrets.DISCORD_WEBHOOK_ERRORS }}
          FORCE: ${{ inputs.force && '1' || '' }}
        run: node scripts/daily-coding-summary.mjs

      - name: Healthcheck success
        if: steps.gate.outputs.go == '1'
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: daily-coding-summary

      - name: Healthcheck fail
        if: failure()
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: daily-coding-summary
          status: fail
