# Coding recap at 00:30 Europe/London: sync the just-ended day's WakaTime data, then post the Discord
# summary. Two UTC crons (23:30 and 00:30) cover BST and GMT; a gate step runs the job only at 00:30 UK.
# The sync runs FIRST and after midnight, so the previous day is complete before the summary reads it.

name: Daily Coding Summary

on:
  schedule:
    - cron: "30 23 * * *" # BST -> 00:30 UK
    - cron: "30 0 * * *" #  GMT -> 00:30 UK
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  recap:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      FORCE: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
    steps:
      - name: Gate to 00:30 UK
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "manual run - proceeding"; echo "go=1" >> "$GITHUB_OUTPUT"; exit 0
          fi
          H=$(TZ=Europe/London date +%H)
          if [ "$H" = "00" ]; then
            echo "go=1" >> "$GITHUB_OUTPUT"
          else
            echo "not 00:xx UK (is ${H}:xx) - skipping"; echo "go=0" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.go == '1'
        uses: actions/checkout@v4

      - if: steps.gate.outputs.go == '1'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - if: steps.gate.outputs.go == '1'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - if: steps.gate.outputs.go == '1'
        run: pip install -r scripts/requirements.txt

      - name: Sync WakaTime data (the just-ended day is now complete)
        if: steps.gate.outputs.go == '1'
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: python scripts/wakatime-sync.py

      - name: Post the daily coding summary to Discord
        if: steps.gate.outputs.go == '1'
        env:
          DISCORD_WEBHOOK_CODING: ${{ secrets.DISCORD_WEBHOOK_CODING }}
        run: node scripts/daily-coding-summary.mjs
