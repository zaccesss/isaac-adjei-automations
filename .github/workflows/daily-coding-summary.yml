# Coding recap for the day that just ended. GitHub Actions cron is unreliable (it delays and drops runs,
# especially at the top of the hour), so instead of one fragile 00:30 slot this fires every 30 minutes
# across the UK morning and the gate acts only in the 07:00-10:00 window; the script claims (job, UK-day)
# so it posts exactly once whenever a run finally lands. The WakaTime sync runs first so yesterday is
# complete before the summary reads it.

name: Daily Coding Summary

on:
  schedule:
    - cron: "7,37 6-10 * * *" # every 30 min, 06:00-10:30 UTC (covers the 07:00-10:00 UK window in BST and GMT)
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  recap:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      FORCE: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
    steps:
      - name: Gate to the 07:00-10:00 UK window
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "manual run - proceeding"; echo "go=1" >> "$GITHUB_OUTPUT"; exit 0
          fi
          H=$((10#$(TZ=Europe/London date +%H)))
          if [ "$H" -ge 7 ] && [ "$H" -le 10 ]; then
            echo "go=1" >> "$GITHUB_OUTPUT"
          else
            echo "outside 07-10 UK (is ${H}) - skipping"; echo "go=0" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.go == '1'
        uses: actions/checkout@v4

      - if: steps.gate.outputs.go == '1'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - if: steps.gate.outputs.go == '1'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - if: steps.gate.outputs.go == '1'
        run: pip install -r scripts/requirements.txt

      - name: Sync WakaTime data (the just-ended day is now complete)
        if: steps.gate.outputs.go == '1'
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: python scripts/wakatime-sync.py

      - name: Post the daily coding summary to Discord
        if: steps.gate.outputs.go == '1'
        env:
          DISCORD_WEBHOOK_CODING: ${{ secrets.DISCORD_WEBHOOK_CODING }}
        run: node scripts/daily-coding-summary.mjs
