# Midday WakaTime sync so the coding dashboard shows the morning's hours during the day. Runs at 12:30
# Europe/London (two UTC crons cover BST and GMT; a gate step runs it only at 12:xx UK). The full
# previous day is synced separately by the 00:30 coding recap workflow before it posts.

name: WakaTime Sync

on:
  schedule:
    # The sync is idempotent, so run it every 3 hours to keep the coding dashboard fresh and to survive
    # GitHub dropping any single scheduled run. No time gate needed.
    - cron: "19 */6 * * *" # backup every 6 hours, matching the primary cadence; idempotent upsert
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Proceed (idempotent sync, safe to run often)
        id: gate
        run: echo "go=1" >> "$GITHUB_OUTPUT"

      - if: steps.gate.outputs.go == '1'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Healthcheck start
        if: steps.gate.outputs.go == '1'
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: wakatime-sync
          status: start

      - if: steps.gate.outputs.go == '1'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - if: steps.gate.outputs.go == '1'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - if: steps.gate.outputs.go == '1'
        run: pip install -r scripts/requirements.txt

      - name: Sync WakaTime data to Supabase
        if: steps.gate.outputs.go == '1'
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          DISCORD_WEBHOOK_ERRORS: ${{ secrets.DISCORD_WEBHOOK_ERRORS }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/wakatime-sync.py

      - name: Healthcheck success
        if: steps.gate.outputs.go == '1'
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: wakatime-sync

      - name: Healthcheck fail
        if: failure()
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: wakatime-sync
          status: fail
