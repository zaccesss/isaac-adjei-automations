# Fetches the latest WakaTime coding stats and upserts them into the wakatime_daily
# table. Runs nightly at 23:00 UTC so the previous day is fully settled before fetch.

name: WakaTime Sync

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - run: pip install -r scripts/requirements.txt

      - name: Sync WakaTime data to Supabase
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/wakatime-sync.py
