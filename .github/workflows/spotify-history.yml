# Records my Spotify plays into listening_history every 30 minutes so the analytics build up real
# history. recently-played only returns the last 50 plays, so a frequent poll makes sure none roll
# off before I capture them. Skips cleanly until the Spotify secrets are set.

name: Spotify history

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Healthcheck start
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: spotify-history
          status: start

      - run: node scripts/spotify-history.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          DISCORD_WEBHOOK_ERRORS: ${{ secrets.DISCORD_WEBHOOK_ERRORS }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}

      - name: Healthcheck success
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: spotify-history

      - name: Healthcheck fail
        if: failure()
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: spotify-history
          status: fail
