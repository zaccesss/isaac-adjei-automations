# Scrapes graduate and internship sources and upserts them into the applications table.
# Runs daily at midnight UTC. API sources and the Playwright browser source run as two
# parallel jobs so the browser install never holds up the faster API job.

name: Job Scraper

on:
  schedule:
    # Two off-peak tries (GitHub drops top-of-hour runs), so a dropped run does not cost a day of scraping.
    # The scrape upserts and de-duplicates, so running twice is harmless.
    - cron: "23 1 * * *"
    - cron: "41 4 * * *"
  workflow_dispatch:
    inputs:
      ai_test:
        description: "Run a quick AI extraction self-test and exit (no scrape)"
        required: false
        default: ""

# Cancel any in-progress run when a new one starts so two runs never write the DB at once.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # API-only sources. SCRAPER_MODE=api makes main() skip the browser source.
  api-sources:
    runs-on: ubuntu-latest
    # Public repo = free Actions minutes, so give the run room to finish. The script's own
    # SCRAPER_BUDGET_MIN (default 110) exits cleanly first.
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r scripts/requirements.txt

      - name: Healthcheck start
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: job-scraper
          status: start

      - name: Run API scrapers
        # Secrets are scoped to this step so the setup and cache actions never see them.
        env:
          SCRAPER_MODE: api
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_JOBS }}
          REED_API_KEY: ${{ secrets.REED_API_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          SCRAPER_AI_TEST: ${{ github.event.inputs.ai_test }}
        run: python -m scraper

      - name: Write source summary
        if: always()
        run: |
          if [ -f source-stats.md ]; then
            cat source-stats.md >> "$GITHUB_STEP_SUMMARY"
          fi

  # Browser source (Playwright) in its own job so the browser install does not delay the API job.
  browser-sources:
    # ubuntu-22.04 avoids the libasound2 removal in 24.04 that breaks playwright install-deps.
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r scripts/requirements.txt

      # Cache the Playwright browser binary so repeated runs skip the ~80 MB download.
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('scripts/requirements.txt') }}

      - name: Install Playwright browser
        run: |
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
            python -m playwright install-deps chromium
          else
            python -m playwright install --with-deps chromium
          fi

      - name: Run browser scrapers
        env:
          SCRAPER_MODE: browser
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_JOBS }}
          SCRAPER_AI_TEST: ${{ github.event.inputs.ai_test }}
        run: python -m scraper

      - name: Write source summary
        if: always()
        run: |
          if [ -f source-stats.md ]; then
            cat source-stats.md >> "$GITHUB_STEP_SUMMARY"
          fi

  # If either scraper job fails, I post an alert to the #errors Discord channel so I know at once.
  notify-failure:
    needs: [api-sources, browser-sources]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Alert on failure
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_ERRORS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$WEBHOOK" ] && exit 0
          curl -s -H "Content-Type: application/json" -d "{\"content\": \"🚨 Job scraper failed. $RUN_URL\"}" "$WEBHOOK" >/dev/null

  # Ping Healthchecks once both scraper jobs settle: success only if both succeeded, otherwise fail. A
  # dropped or failing scrape then shows up on the status page and in the #monitoring alerts.
  healthcheck:
    needs: [api-sources, browser-sources]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Healthcheck success
        if: needs.api-sources.result == 'success' && needs.browser-sources.result == 'success'
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: job-scraper
      - name: Healthcheck fail
        if: needs.api-sources.result != 'success' || needs.browser-sources.result != 'success'
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: job-scraper
          status: fail
