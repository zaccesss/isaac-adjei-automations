# Deletes merged PR branches that the merge itself failed to clean up.
#
# This used to also push branch updates to keep open PRs in sync with main, because
# the repo's branch ruleset required PRs to be up to date with main before merging
# (strict_required_status_checks_policy). That requirement caused a bad chain: every
# merge knocked other open PRs "behind", this workflow pushed an update-branch commit
# authored by github-actions[bot] to fix that, and GitHub then held the resulting CI
# run for manual approval because it was triggered by a bot-authored push - turning a
# routine merge into something needing constant manual intervention. Removed that
# requirement from the ruleset instead, so each PR now merges as soon as its own
# checks pass regardless of what else merges around it, and this workflow no longer
# needs to touch open PR branches at all.
#
# GitHub does not trigger other workflows' `push` or `pull_request` events for actions
# performed with a workflow's own GITHUB_TOKEN (anti-recursion safeguard), so the
# automerge job's squash-merge commits don't reliably trigger this on `push: main`.
# A `schedule` trigger doesn't depend on what authored the previous event, so it's
# used as the reliable path; deleting an already-merged branch never pushes a commit
# to an open PR, so it can't recreate the approval-gate problem above.

name: Repo maintenance

on:
  push:
    branches: [main]
  schedule:
    # Every 2 hours - cheap (~360 min/month) safety net for branch deletion only
    - cron: "0 */2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  maintain-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Delete head branches of merged PRs that still exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # Look at recently merged PRs - their head branch should have been deleted
          # at merge time but the GITHUB_TOKEN restriction above means that often didn't fire
          merged_branches=$(gh api "repos/$REPO/pulls?state=closed&sort=updated&direction=desc&per_page=30" \
            --jq '[.[] | select(.merged_at != null and .head.repo.full_name == "'"$REPO"'") | .head.ref] | .[]')

          if [ -z "$merged_branches" ]; then
            echo "No recently merged PRs found"
            exit 0
          fi

          while read -r branch; do
            [ "$branch" = "main" ] && continue
            if gh api "repos/$REPO/branches/$branch" >/dev/null 2>&1; then
              echo "Deleting stale merged branch: $branch"
              gh api -X DELETE "repos/$REPO/git/refs/heads/$branch" || echo "Failed to delete $branch - may already be gone"
            fi
          done <<< "$merged_branches"
