# One-off experiment (dispatch only): does Scrapling's Cloudflare solver reach the
# boards that 403 in CI? Writes nothing to the database - it only prints whether
# each board was reached. If it works, I wire Scrapling into the scraper; if not,
# the block is IP reputation and needs a residential path. Delete after deciding.
name: Cloudflare probe

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Scrapling and its browser
        run: |
          pip install "scrapling[fetchers]"
          scrapling install
      - name: Probe the blocked boards
        run: python scripts/cf_probe.py
