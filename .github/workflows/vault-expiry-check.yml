# Checks the vault and inventory_items tables for upcoming or past expiry dates and posts a Discord
# alert if any are found. Runs at 08:00 Europe/London. Two UTC crons (07:12 and 08:12) cover BST and
# GMT; a gate step runs it only at 08:xx UK. The :12 minute leaves room for GitHub's scheduling delay.

name: Vault Expiry Check

on:
  schedule:
    # Fire every 30 min across 07:00-10:00 UTC (covers the 08:00-10:00 UK window in BST and GMT). GitHub
    # drops many scheduled runs, so several tries guarantee one lands; the script claims once per day.
    - cron: "17,47 7-10 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Gate to the 08:00-10:00 UK window
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "manual run - proceeding"; echo "go=1" >> "$GITHUB_OUTPUT"; exit 0
          fi
          H=$((10#$(TZ=Europe/London date +%H)))
          if [ "$H" -ge 8 ] && [ "$H" -le 10 ]; then
            echo "go=1" >> "$GITHUB_OUTPUT"
          else
            echo "outside 08-10 UK (is ${H}) - skipping"; echo "go=0" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.go == '1'
        uses: actions/checkout@v4

      - if: steps.gate.outputs.go == '1'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Healthcheck start
        if: steps.gate.outputs.go == '1'
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: vault-expiry-check
          status: start

      - name: Run vault expiry check
        if: steps.gate.outputs.go == '1'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISCORD_WEBHOOK_VAULT: ${{ secrets.DISCORD_WEBHOOK_VAULT }}
          FORCE: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: node scripts/vault-expiry-check.mjs

      - name: Healthcheck success
        if: steps.gate.outputs.go == '1'
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: vault-expiry-check

      - name: Healthcheck fail
        if: failure()
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: vault-expiry-check
          status: fail
