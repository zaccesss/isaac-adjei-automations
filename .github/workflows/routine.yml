# Posts a morning habit and streak checklist to Discord, once, around 07:00 Europe/London.
# GitHub Actions cron drops many runs, so this fires every 30 min across 06:00-09:30 UTC (the 07:00-09:00
# UK window in BST and GMT) and the script posts once and claims (job, UK-day) so it never repeats.

name: Routine checklist

on:
  schedule:
    - cron: "9,39 6-9 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node scripts/routine.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISCORD_WEBHOOK_ROUTINE: ${{ secrets.DISCORD_WEBHOOK_ROUTINE }}
          FORCE: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
