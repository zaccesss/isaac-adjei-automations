# Posts the habit and streak checklist to Discord twice a day: the full morning checklist around
# 07:00 Europe/London and a smart evening pass around 20:00 that only chases what is still unlogged.
# GitHub Actions cron drops many runs, so each slot fires every 30 min across its window (covering
# BST and GMT) and the script posts once per slot and claims (job-slot, UK-day) so it never repeats.

name: Routine checklist

on:
  schedule:
    - cron: "9,39 7 * * *" # morning backup pair at 07:09/07:39 UTC: inside the 07:00-09:00 UK window in GMT and BST
    - cron: "9,39 20 * * *" # evening backup pair at 20:09/20:39 UTC: inside the 20:00-22:00 UK window in GMT and BST
  workflow_dispatch:
    inputs:
      force:
        description: "Force a re-send: bypass the hour gate and the once-per-day claim"
        type: boolean
        default: false
      slot:
        description: "Slot: am posts the full morning checklist, pm the evening still-unlogged pass (blank = pick by London hour)"
        type: choice
        options: ["", "am", "pm"]
        default: ""

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
      - name: Healthcheck start
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: routine
          status: start
      - run: node scripts/routine.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          DISCORD_WEBHOOK_ERRORS: ${{ secrets.DISCORD_WEBHOOK_ERRORS }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISCORD_WEBHOOK_ROUTINE: ${{ secrets.DISCORD_WEBHOOK_ROUTINE }}
          FORCE: ${{ inputs.force && '1' || '' }}
          SLOT: ${{ inputs.slot }}
      - name: Healthcheck success
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: routine
      - name: Healthcheck fail
        if: failure()
        uses: ./.github/actions/healthcheck
        with:
          ping-key: ${{ secrets.HEALTHCHECK_PING_KEY }}
          slug: routine
          status: fail
